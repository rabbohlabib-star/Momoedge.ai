<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>MomoEdge — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #020408;
      --panel: #060c14;
      --border: rgba(0,224,255,.13);
      --text: #d6eeff;
      --muted: #4a6a8a;
      --core: #00e5ff;
      --green: #00ffa3;
      --red: #ff3b3b;
      --amber: #ffb300;
      --mono: 'JetBrains Mono', 'Share Tech Mono', ui-monospace, monospace;
      --display: 'Orbitron', monospace;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bgFixed {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .bgFixed::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .bgFixed::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px);
    }
    .bgOrb {
      position: absolute; top: -15%; left: 50%; transform: translateX(-50%);
      width: min(800px, 140vw); height: min(800px, 140vw);
      background: radial-gradient(ellipse at 50% 40%, rgba(0,229,255,.12) 0%, rgba(0,229,255,.04) 35%, transparent 65%);
      animation: orbPulse 6s ease-in-out infinite; pointer-events: none;
    }
    @keyframes orbPulse { 0%,100%{opacity:.7;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.05)} }

    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
    }

    /* ── MAIN CONTAINER ── */
    .container {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px;
    }

    /* ── LOGO ── */
    .logo {
      font-family: var(--display);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--core);
      text-shadow: 0 0 30px rgba(0,229,255,.4), 0 0 60px rgba(0,229,255,.15);
      margin-bottom: 6px;
      animation: logoGlow 3s ease-in-out infinite;
    }
    @keyframes logoGlow {
      0%,100% { text-shadow: 0 0 30px rgba(0,229,255,.4), 0 0 60px rgba(0,229,255,.15); }
      50% { text-shadow: 0 0 40px rgba(0,229,255,.6), 0 0 80px rgba(0,229,255,.25); }
    }
    .logo-sub {
      font-family: var(--display);
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* ── AUTH CARD ── */
    .authCard {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(165deg, rgba(6,12,20,.95), rgba(3,6,12,.98));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 40px rgba(0,229,255,.04),
        inset 0 1px 0 rgba(0,229,255,.06);
      animation: cardIn .6s ease-out;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 0; margin-bottom: 32px;
      border-bottom: 1px solid rgba(0,229,255,.08);
    }
    .tab {
      flex: 1;
      padding: 12px 0;
      font-family: var(--display);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: all .25s;
      position: relative;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--core); }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 10%; right: 10%;
      height: 2px;
      background: var(--core);
      box-shadow: 0 0 8px rgba(0,229,255,.5);
      border-radius: 2px;
    }

    /* ── FORM ── */
    .formGroup { margin-bottom: 20px; }
    .formLabel {
      display: block;
      font-family: var(--display);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .formInput {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,229,255,.03);
      border: 1px solid rgba(0,229,255,.1);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
      transition: all .25s;
    }
    .formInput:focus {
      border-color: rgba(0,229,255,.35);
      background: rgba(0,229,255,.06);
      box-shadow: 0 0 16px rgba(0,229,255,.08);
    }
    .formInput::placeholder { color: rgba(74,106,138,.5); }

    /* ── BUTTONS ── */
    .btnPrimary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, rgba(0,229,255,.15), rgba(0,229,255,.08));
      border: 1px solid rgba(0,229,255,.3);
      border-radius: 10px;
      color: var(--core);
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .3s;
      position: relative;
      overflow: hidden;
    }
    .btnPrimary:hover {
      background: linear-gradient(135deg, rgba(0,229,255,.22), rgba(0,229,255,.12));
      box-shadow: 0 0 24px rgba(0,229,255,.15);
      transform: translateY(-1px);
    }
    .btnPrimary:active { transform: translateY(0); }
    .btnPrimary:disabled {
      opacity: .4; cursor: not-allowed; transform: none;
    }

    .btnGoogle {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      transition: all .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btnGoogle:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.2);
    }
    .btnGoogle svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 16px; margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(0,229,255,.08);
    }
    .divider span {
      font-family: var(--display); font-size: 8px; letter-spacing: 2px; color: var(--muted);
    }

    .forgotLink {
      display: block; text-align: right; font-size: 11px; color: var(--muted);
      text-decoration: none; margin-top: -12px; margin-bottom: 24px;
      transition: color .2s; cursor: pointer;
    }
    .forgotLink:hover { color: var(--core); }

    /* ── MESSAGES ── */
    .msg {
      padding: 12px 16px; border-radius: 8px; font-size: 12px;
      margin-bottom: 20px; display: none;
      animation: msgIn .3s ease-out;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(-4px); } }
    .msg.error { display: block; background: rgba(255,59,59,.08); border: 1px solid rgba(255,59,59,.2); color: var(--red); }
    .msg.success { display: block; background: rgba(0,255,163,.06); border: 1px solid rgba(0,255,163,.15); color: var(--green); }
    .msg.info { display: block; background: rgba(0,229,255,.06); border: 1px solid rgba(0,229,255,.12); color: var(--core); }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,229,255,.2); border-top-color: var(--core);
      border-radius: 50%; animation: spin .6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .view { display: none; }
    .view.active { display: block; }

    .backLink {
      font-size: 11px; color: var(--muted); cursor: pointer;
      transition: color .2s; margin-bottom: 24px; display: inline-block;
    }
    .backLink:hover { color: var(--core); }

    .viewTitle {
      font-family: var(--display); font-size: 14px; letter-spacing: 2px;
      color: var(--text); margin-bottom: 8px;
    }
    .viewDesc {
      font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 28px;
    }

    /* ── Password field wrapper ── */
    .passWrap { position: relative; }
    .passWrap .formInput { padding-right: 44px; }
    .eyeBtn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 4px;
      transition: color .2s; line-height: 1;
    }
    .eyeBtn:hover { color: var(--core); }

    .footer { margin-top: 32px; text-align: center; }
    .footer a {
      font-size: 10px; color: var(--muted); text-decoration: none;
      letter-spacing: 1px; transition: color .2s;
    }
    .footer a:hover { color: var(--core); }

    @media (max-width: 480px) {
      .authCard { padding: 32px 24px; }
      .logo { font-size: 22px; letter-spacing: 4px; }
    }
  </style>
</head>
<body>

  <div class="bgFixed"><div class="bgOrb"></div></div>
  <div class="scanlines"></div>

  <div class="container">
    <div class="logo">MOMOEDGE</div>
    <div class="logo-sub">ORACLE TERMINAL</div>

    <div class="authCard">

      <!-- ═══ LOGIN / SIGNUP VIEW ═══ -->
      <div class="view active" id="viewAuth">
        <div class="tabs">
          <button class="tab active" data-tab="login">LOGIN</button>
          <button class="tab" data-tab="signup">SIGN UP</button>
        </div>

        <div id="authMsg" class="msg"></div>

        <button class="btnGoogle" id="googleBtn">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <div class="divider"><span>OR</span></div>

        <form id="authForm" autocomplete="on">
          <div class="formGroup" id="nameGroup" style="display:none;">
            <label class="formLabel">FULL NAME</label>
            <input class="formInput" type="text" id="nameInput" placeholder="Enter your name" autocomplete="name"/>
          </div>
          <div class="formGroup">
            <label class="formLabel">EMAIL</label>
            <input class="formInput" type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" required/>
          </div>
          <div class="formGroup">
            <label class="formLabel">PASSWORD</label>
            <div class="passWrap">
              <input class="formInput" type="password" id="passInput" placeholder="Enter password" autocomplete="current-password" required/>
              <button type="button" class="eyeBtn" id="eyePass">👁</button>
            </div>
          </div>
          <div class="formGroup" id="confirmGroup" style="display:none;">
            <label class="formLabel">CONFIRM PASSWORD</label>
            <div class="passWrap">
              <input class="formInput" type="password" id="confirmInput" placeholder="Re-enter password" autocomplete="new-password"/>
              <button type="button" class="eyeBtn" id="eyeConfirm">👁</button>
            </div>
          </div>
          <a class="forgotLink" id="forgotLink">Forgot password?</a>
          <button class="btnPrimary" type="submit" id="submitBtn">LOGIN →</button>
        </form>
      </div>

      <!-- ═══ FORGOT PASSWORD VIEW ═══ -->
      <div class="view" id="viewForgot">
        <span class="backLink" id="backToLogin">← BACK TO LOGIN</span>
        <div class="viewTitle">RESET PASSWORD</div>
        <div class="viewDesc">Enter your email and we'll send you a link to reset your password.</div>
        <div id="forgotMsg" class="msg"></div>
        <form id="forgotForm">
          <div class="formGroup">
            <label class="formLabel">EMAIL</label>
            <input class="formInput" type="email" id="forgotEmail" placeholder="you@example.com" required/>
          </div>
          <button class="btnPrimary" type="submit" id="forgotBtn">SEND RESET LINK →</button>
        </form>
      </div>

    </div>

    <div class="footer">
      <a href="https://momoedge.com">MOMOEDGE.COM</a>
    </div>
  </div>

<script>
  // ── SUPABASE ──
  const SB_URL = 'https://pojiqfeemksvocnaellu.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvamlxZmVlbWtzdm9jbmFlbGx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjg2NTgsImV4cCI6MjA4Njg0NDY1OH0.oOrfkygK_MM-zZyemF0D2HtL8YRuzrryRQ2dmSRwAXI';
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  const TERMINAL_URL = './terminal.html';
  const SITE_URL = window.location.origin;

  let mode = 'login';

  // DOM
  const tabs = document.querySelectorAll('.tab');
  const authForm = document.getElementById('authForm');
  const emailInput = document.getElementById('emailInput');
  const passInput = document.getElementById('passInput');
  const nameInput = document.getElementById('nameInput');
  const nameGroup = document.getElementById('nameGroup');
  const submitBtn = document.getElementById('submitBtn');
  const authMsg = document.getElementById('authMsg');
  const googleBtn = document.getElementById('googleBtn');
  const forgotLink = document.getElementById('forgotLink');
  const viewAuth = document.getElementById('viewAuth');
  const viewForgot = document.getElementById('viewForgot');
  const forgotForm = document.getElementById('forgotForm');
  const forgotEmail = document.getElementById('forgotEmail');
  const forgotBtn = document.getElementById('forgotBtn');
  const forgotMsg = document.getElementById('forgotMsg');
  const backToLogin = document.getElementById('backToLogin');

  // ── IF ALREADY LOGGED IN → GO TO TERMINAL ──
  (async function() {
    // Check for recovery flow FIRST (from password reset email)
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
    const isRecovery = params.get('type') === 'recovery' 
      || hashParams.get('type') === 'recovery'
      || window.location.hash.includes('type=recovery');
    
    if (isRecovery) {
      // Let Supabase process the token, then redirect to reset page
      return;
    }

    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      window.location.replace(TERMINAL_URL);
      return;
    }
    // URL param messages
    const p = new URLSearchParams(window.location.search);
    if (p.get('msg') === 'signed_out') showMsg(authMsg, 'You have been signed out.', 'info');
    else if (p.get('msg') === 'password_updated') showMsg(authMsg, 'Password updated! Please log in.', 'success');
    else if (p.get('msg') === 'check_email') showMsg(authMsg, 'Check your email for a confirmation link.', 'info');
  })();

  // ── AUTH STATE LISTENER (handles OAuth redirect back) ──
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY' && session) {
      // Recovery token processed — redirect to reset password page
      window.location.replace('./reset-password.html');
      return;
    }
    if (event === 'SIGNED_IN' && session) {
      window.location.replace(TERMINAL_URL);
    }
  });

  // ── TABS ──
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      mode = tab.dataset.tab;
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      hideMsg(authMsg);
      if (mode === 'signup') {
        nameGroup.style.display = 'block';
        document.getElementById('confirmGroup').style.display = 'block';
        submitBtn.textContent = 'CREATE ACCOUNT →';
        forgotLink.style.display = 'none';
        passInput.autocomplete = 'new-password';
      } else {
        nameGroup.style.display = 'none';
        document.getElementById('confirmGroup').style.display = 'none';
        submitBtn.textContent = 'LOGIN →';
        forgotLink.style.display = 'block';
        passInput.autocomplete = 'current-password';
      }
    });
  });

  // ── EMAIL / PASSWORD AUTH ──
  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    const password = passInput.value;
    const name = nameInput.value.trim();

    if (!email || !password) { showMsg(authMsg, 'Please fill in all fields.', 'error'); return; }
    if (password.length < 6) { showMsg(authMsg, 'Password must be at least 6 characters.', 'error'); return; }
    if (mode === 'signup') {
      const confirm = document.getElementById('confirmInput').value;
      if (password !== confirm) { showMsg(authMsg, 'Passwords do not match.', 'error'); return; }
    }

    setLoading(submitBtn, true);
    hideMsg(authMsg);

    if (mode === 'signup') {
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: {
          data: { full_name: name || undefined },
          emailRedirectTo: SITE_URL + '/terminal.html'
        }
      });
      setLoading(submitBtn, false);
      if (error) {
        showMsg(authMsg, friendlyError(error.message), 'error');
      } else if (data?.user?.identities?.length === 0) {
        showMsg(authMsg, 'An account with this email already exists. Try logging in.', 'error');
      } else if (data?.session) {
        window.location.replace(TERMINAL_URL);
      } else {
        showMsg(authMsg, 'Account created! Check your email to confirm, then log in.', 'success');
        setTimeout(() => tabs[0].click(), 2500);
      }
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      setLoading(submitBtn, false);
      if (error) {
        showMsg(authMsg, friendlyError(error.message), 'error');
      } else {
        window.location.replace(TERMINAL_URL);
      }
    }
  });

  // ── GOOGLE OAUTH ──
  googleBtn.addEventListener('click', async () => {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: SITE_URL + '/terminal.html' }
    });
    if (error) showMsg(authMsg, 'Google sign-in failed. Please try again.', 'error');
  });

  // ── FORGOT PASSWORD ──
  forgotLink.addEventListener('click', () => {
    viewAuth.classList.remove('active');
    viewForgot.classList.add('active');
    hideMsg(authMsg);
    forgotEmail.value = emailInput.value;
  });

  backToLogin.addEventListener('click', () => {
    viewForgot.classList.remove('active');
    viewAuth.classList.add('active');
    hideMsg(forgotMsg);
  });

  forgotForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = forgotEmail.value.trim();
    if (!email) { showMsg(forgotMsg, 'Please enter your email.', 'error'); return; }
    setLoading(forgotBtn, true);
    hideMsg(forgotMsg);
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: SITE_URL + '/reset-password.html'
    });
    setLoading(forgotBtn, false);
    if (error) {
      showMsg(forgotMsg, friendlyError(error.message), 'error');
    } else {
      showMsg(forgotMsg, 'If an account exists with this email, a reset link has been sent.', 'success');
    }
  });

  // ── HELPERS ──
  function showMsg(el, text, type) { el.textContent = text; el.className = 'msg ' + type; }
  function hideMsg(el) { el.className = 'msg'; el.textContent = ''; }
  function setLoading(btn, loading) {
    if (loading) {
      btn.disabled = true; btn._orig = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span> PROCESSING...';
    } else {
      btn.disabled = false; btn.textContent = btn._orig || 'SUBMIT';
    }
  }
  function friendlyError(msg) {
    const m = msg.toLowerCase();
    if (m.includes('invalid login')) return 'Invalid email or password.';
    if (m.includes('email not confirmed')) return 'Please confirm your email first. Check your inbox.';
    if (m.includes('user already registered')) return 'An account with this email already exists.';
    if (m.includes('rate limit') || m.includes('too many')) return 'Too many attempts. Please wait and try again.';
    if (m.includes('weak password') || m.includes('at least')) return 'Password must be at least 6 characters.';
    if (m.includes('network') || m.includes('fetch')) return 'Network error. Check your connection.';
    return msg;
  }

  // ── EYE TOGGLE — show/hide password ──
  function setupEyeToggle(btnId, inputId) {
    const btn = document.getElementById(btnId);
    const inp = document.getElementById(inputId);
    if (!btn || !inp) return;
    btn.addEventListener('click', () => {
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🔒'; }
      else { inp.type = 'password'; btn.textContent = '👁'; }
    });
  }
  setupEyeToggle('eyePass', 'passInput');
  setupEyeToggle('eyeConfirm', 'confirmInput');
</script>
</body>
</html>
