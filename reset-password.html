<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>MomoEdge — Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #020408; --panel: #060c14; --border: rgba(0,224,255,.13);
      --text: #d6eeff; --muted: #4a6a8a; --core: #00e5ff;
      --green: #00ffa3; --red: #ff3b3b;
      --mono: 'JetBrains Mono', 'Share Tech Mono', ui-monospace, monospace;
      --display: 'Orbitron', monospace;
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--mono); overflow-x: hidden; }
    .bgFixed { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bgFixed::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .bgOrb {
      position: absolute; top: -15%; left: 50%; transform: translateX(-50%);
      width: min(800px, 140vw); height: min(800px, 140vw);
      background: radial-gradient(ellipse at 50% 40%, rgba(0,229,255,.12) 0%, rgba(0,229,255,.04) 35%, transparent 65%);
      animation: orbPulse 6s ease-in-out infinite; pointer-events: none;
    }
    @keyframes orbPulse { 0%,100%{opacity:.7;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.05)} }
    .container {
      position: relative; z-index: 2; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px;
    }
    .logo { font-family: var(--display); font-size: 28px; font-weight: 900; letter-spacing: 6px; color: var(--core); text-shadow: 0 0 30px rgba(0,229,255,.4); margin-bottom: 6px; }
    .logo-sub { font-family: var(--display); font-size: 9px; letter-spacing: 4px; color: var(--muted); margin-bottom: 40px; }
    .authCard {
      width: 100%; max-width: 420px;
      background: linear-gradient(165deg, rgba(6,12,20,.95), rgba(3,6,12,.98));
      border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0,229,255,.04), inset 0 1px 0 rgba(0,229,255,.06);
      animation: cardIn .6s ease-out;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .viewTitle { font-family: var(--display); font-size: 14px; letter-spacing: 2px; color: var(--text); margin-bottom: 8px; }
    .viewDesc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
    .formGroup { margin-bottom: 20px; }
    .formLabel { display: block; font-family: var(--display); font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
    .formInput {
      width: 100%; padding: 14px 16px; background: rgba(0,229,255,.03);
      border: 1px solid rgba(0,229,255,.1); border-radius: 10px; color: var(--text);
      font-family: var(--mono); font-size: 14px; outline: none; transition: all .25s;
    }
    .formInput:focus { border-color: rgba(0,229,255,.35); background: rgba(0,229,255,.06); box-shadow: 0 0 16px rgba(0,229,255,.08); }
    .formInput::placeholder { color: rgba(74,106,138,.5); }
    .btnPrimary {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, rgba(0,229,255,.15), rgba(0,229,255,.08));
      border: 1px solid rgba(0,229,255,.3); border-radius: 10px;
      color: var(--core); font-family: var(--display); font-size: 12px; letter-spacing: 3px;
      cursor: pointer; transition: all .3s;
    }
    .btnPrimary:hover { background: linear-gradient(135deg, rgba(0,229,255,.22), rgba(0,229,255,.12)); box-shadow: 0 0 24px rgba(0,229,255,.15); transform: translateY(-1px); }
    .btnPrimary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .msg { padding: 12px 16px; border-radius: 8px; font-size: 12px; margin-bottom: 20px; display: none; animation: msgIn .3s ease-out; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(-4px); } }
    .msg.error { display: block; background: rgba(255,59,59,.08); border: 1px solid rgba(255,59,59,.2); color: var(--red); }
    .msg.success { display: block; background: rgba(0,255,163,.06); border: 1px solid rgba(0,255,163,.15); color: var(--green); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,229,255,.2); border-top-color: var(--core); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loginLink { display: block; text-align: center; margin-top: 24px; font-size: 11px; color: var(--muted); text-decoration: none; transition: color .2s; }
    .loginLink:hover { color: var(--core); }
    .passWrap { position: relative; }
    .passWrap .formInput { padding-right: 44px; }
    .eyeBtn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 4px;
      transition: color .2s; line-height: 1;
    }
    .eyeBtn:hover { color: var(--core); }
    @media (max-width: 480px) { .authCard { padding: 32px 24px; } .logo { font-size: 22px; letter-spacing: 4px; } }
  </style>
</head>
<body>
  <div class="bgFixed"><div class="bgOrb"></div></div>
  <div class="container">
    <div class="logo">MOMOEDGE</div>
    <div class="logo-sub">PASSWORD RESET</div>
    <div class="authCard">
      <div class="viewTitle">SET NEW PASSWORD</div>
      <div class="viewDesc">Enter your new password below. Must be at least 6 characters.</div>
      <div id="msg" class="msg"></div>
      <form id="resetForm">
        <div class="formGroup">
          <label class="formLabel">NEW PASSWORD</label>
          <div class="passWrap">
            <input class="formInput" type="password" id="newPass" placeholder="New password" autocomplete="new-password" required/>
            <button type="button" class="eyeBtn" id="eyeNew">👁</button>
          </div>
        </div>
        <div class="formGroup">
          <label class="formLabel">CONFIRM PASSWORD</label>
          <div class="passWrap">
            <input class="formInput" type="password" id="confirmPass" placeholder="Confirm password" autocomplete="new-password" required/>
            <button type="button" class="eyeBtn" id="eyeConfirm">👁</button>
          </div>
        </div>
        <button class="btnPrimary" type="submit" id="resetBtn">UPDATE PASSWORD →</button>
      </form>
      <a class="loginLink" href="./login.html">← Back to Login</a>
    </div>
  </div>
<script>
  const SB_URL = 'https://pojiqfeemksvocnaellu.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvamlxZmVlbWtzdm9jbmFlbGx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjg2NTgsImV4cCI6MjA4Njg0NDY1OH0.oOrfkygK_MM-zZyemF0D2HtL8YRuzrryRQ2dmSRwAXI';
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  const msgEl = document.getElementById('msg');
  const resetForm = document.getElementById('resetForm');
  const resetBtn = document.getElementById('resetBtn');
  const newPass = document.getElementById('newPass');
  const confirmPass = document.getElementById('confirmPass');

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      console.log('[Oracle] Recovery session established');
    }
  });

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = newPass.value;
    const pw2 = confirmPass.value;
    if (!pw || !pw2) { showMsg('Please fill in both fields.', 'error'); return; }
    if (pw.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
    if (pw !== pw2) { showMsg('Passwords do not match.', 'error'); return; }

    resetBtn.disabled = true;
    resetBtn.innerHTML = '<span class="spinner"></span> UPDATING...';
    msgEl.className = 'msg'; msgEl.textContent = '';

    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) {
      resetBtn.disabled = false;
      resetBtn.textContent = 'UPDATE PASSWORD →';
      showMsg(error.message, 'error');
    } else {
      showMsg('Password updated! Redirecting to login...', 'success');
      await sb.auth.signOut();
      setTimeout(() => { window.location.replace('./login.html?msg=password_updated'); }, 1500);
    }
  });

  function showMsg(text, type) { msgEl.textContent = text; msgEl.className = 'msg ' + type; }

  // ── EYE TOGGLE ──
  function setupEye(btnId, inputId) {
    const btn = document.getElementById(btnId);
    const inp = document.getElementById(inputId);
    if (!btn || !inp) return;
    btn.addEventListener('click', () => {
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🔒'; }
      else { inp.type = 'password'; btn.textContent = '👁'; }
    });
  }
  setupEye('eyeNew', 'newPass');
  setupEye('eyeConfirm', 'confirmPass');
</script>
</body>
</html>
